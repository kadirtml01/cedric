<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL TECH | KURUMSAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        h1 { font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 15px; }
        h1 span { color: #ff4500; }
        p { color: #aaa; font-size: 0.85rem; line-height: 1.6; margin-bottom: 30px; }

        .service-mini {
            display: grid; gap: 15px; width: 100%; margin-bottom: 30px;
        }
        .s-item {
            background: rgba(255, 69, 0, 0.05);
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 69, 0, 0.1);
            font-size: 0.8rem; font-weight: bold; color: #ff4500;
        }

        .back-link { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; }
    </style>
</head>
<body>
    <a href="ornek-siteler.html" class="back-link"><i class="fas fa-arrow-left"></i> GERİ DÖN</a>
    <div class="hero">
        <div class="glass-box">
            <p style="letter-spacing: 4px; font-size: 0.6rem; margin-bottom: 10px;">CORPORATE SOLUTIONS</p>
            <h1>DİJİTAL <span>VİZYON</span></h1>
            <p>İşletmenizi modernize eden profesyonel yazılım ve kurumsal kimlik çözümleri.</p>
            
            <div class="service-mini">
                <div class="s-item"><i class="fas fa-code"></i> ÖZEL YAZILIM</div>
                <div class="s-item"><i class="fas fa-cloud"></i> BULUT SİSTEMLER</div>
            </div>

            <a href="#" style="background: #ff4500; color: #fff; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 0.8rem;">BİZE ULAŞIN</a>
        </div>
    </div>
</body>
</html>
