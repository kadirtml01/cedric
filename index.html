<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRIC | MODS & SOFTWARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4500;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--primary);
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .menu-grid {
            width: 90%;
            max-width: 450px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px 15px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            text-align: center;
        }

        .full-width { grid-column: span 2; flex-direction: row; text-align: left; padding: 20px 25px; justify-content: space-between; }
        
        .menu-card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 12px; }
        .full-width i { margin-bottom: 0; margin-right: 15px; }

        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3) !important; }
        .gold-border i { color: var(--accent-gold); }

        .order-card { background: linear-gradient(45deg, #ff4500, #b33000); border: none; }
        .order-card i, .order-card span, .order-card small { color: #fff !important; }

        /* YENİ: Alt Bilgi Kutuları (Boşluğu Kapatan Kısım) */
        .info-section {
            width: 90%;
            max-width: 450px;
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 40px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .info-box i { color: var(--primary); font-size: 1.2rem; margin-bottom: 8px; }
        .info-box span { display: block; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        .info-box small { color: #555; font-size: 0.6rem; }

        .social-links { display: flex; gap: 25px; padding-bottom: 30px; margin-top: auto; }
        .social-links a { color: #333; font-size: 1.2rem; }

        footer { padding-bottom: 20px; font-size: 0.55rem; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">CEDRIC</h1>
        <div class="tagline">MODS & SOFTWARE HUB</div>
    </header>

    <div class="menu-grid">
        <a href="uygulamalar.html" class="menu-card"><i class="fas fa-mobile-alt"></i><span>UYGULAMALAR</span></a>
        <a href="oyunlar.html" class="menu-card"><i class="fas fa-gamepad"></i><span>OYUNLAR</span></a>
        
        <a href="ornek-siteler.html" class="menu-card full-width gold-border">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-eye"></i>
                <div style="margin-left:15px;"><span>ÖRNEK PROJELER</span><small style="color:#555; display:block; font-size:0.7rem;">Çalışmaları İncele</small></div>
            </div>
            <i class="fas fa-chevron-right" style="font-size:0.8rem; opacity:0.2;"></i>
        </a>

        <a href="siparis.html" class="menu-card full-width order-card">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-shopping-cart"></i>
                <div style="margin-left:15px;"><span>SİPARİŞ MERKEZİ</span><small style="display:block; font-size:0.7rem;">Web veya Uygulama Sipariş Et</small></div>
            </div>
            <i class="fas fa-arrow-right" style="font-size:0.8rem;"></i>
        </a>
    </div>

    <div class="info-section">
        <div class="info-box"><i class="fas fa-bolt"></i><span>HIZLI TESLİMAT</span><small>Max 48 Saat</small></div>
        <div class="info-box"><i class="fas fa-headset"></i><span>7/24 DESTEK</span><small>Kesintisiz İletişim</small></div>
        <div class="info-box" style="grid-column: span 2;"><i class="fas fa-code-branch" style="color:var(--accent-gold);"></i><span style="color:var(--accent-gold);">GÜNCEL TEKNOLOJİLER</span><small>En Son SDK Versiyonları</small></div>
    </div>

    <div class="social-links">
        <a href="https://www.instagram.com/kadirtml.tr?igsh=dGtzNms5azMwY2E3"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/cedricgaming"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>CEDRIC GAMING | DESIGNED FOR THE ELITE - 2026</footer>
</body>
</html>
