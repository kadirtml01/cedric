<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRIC | MODS & SOFTWARE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4500;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arka plana asil bir parıltı */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        header {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--primary);
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Yeni Grid Düzeni */
        .menu-grid {
            width: 90%;
            max-width: 450px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Uygulama ve Oyun Yan Yana */
            gap: 15px;
            margin-bottom: 50px;
        }

        .menu-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px 15px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .menu-card i {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .menu-card span {
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Sipariş ve Örnek Projeler İçin Tam Genişlik */
        .full-width {
            grid-column: span 2;
            flex-direction: row;
            text-align: left;
            padding: 20px 25px;
            justify-content: space-between;
        }

        .full-width i { margin-bottom: 0; margin-right: 5px; }

        .card-info { flex: 1; margin-left: 15px; }
        .card-info span { display: block; font-size: 1rem; }
        .card-info small { color: #555; font-size: 0.7rem; }

        /* Asalet Dokunuşu (Altın Çerçeve) */
        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.3) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.05);
        }
        .gold-border i { color: var(--accent-gold); }

        /* Sipariş Merkezi - Canlı Renk */
        .order-card {
            background: linear-gradient(45deg, #ff4500, #b33000);
            border: none;
        }
        .order-card i, .order-card span, .order-card small { color: #fff !important; }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(255, 69, 0, 0.05);
        }

        .social-links {
            margin-top: auto;
            display: flex;
            gap: 25px;
            padding-bottom: 40px;
        }

        .social-links a { color: #333; font-size: 1.2rem; transition: 0.3s; }
        .social-links a:hover { color: var(--primary); }

        footer {
            padding-bottom: 20px;
            font-size: 0.55rem;
            color: #222;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">CEDRIC</h1>
        <div class="tagline">MODS & SOFTWARE HUB</div>
    </header>

    <div class="menu-grid">
        
        <a href="uygulamalar.html" class="menu-card">
            <i class="fas fa-mobile-alt"></i>
            <span>UYGULAMALAR</span>
        </a>

        <a href="oyunlar.html" class="menu-card">
            <i class="fas fa-gamepad"></i>
            <span>OYUNLAR</span>
        </a>

        <a href="ornek-siteler.html" class="menu-card full-width gold-border">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-eye"></i>
                <div class="card-info">
                    <span>ÖRNEK PROJELER</span>
                    <small>Yaptığım Çalışmaları İncele</small>
                </div>
            </div>
            <i class="fas fa-chevron-right" style="font-size:0.8rem; opacity:0.2;"></i>
        </a>

        <a href="siparis.html" class="menu-card full-width order-card">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-shopping-cart"></i>
                <div class="card-info">
                    <span>SİPARİŞ MERKEZİ</span>
                    <small>Web Sitesi veya Uygulama Sipariş Et</small>
                </div>
            </div>
            <i class="fas fa-arrow-right" style="font-size:0.8rem;"></i>
        </a>

    </div>

    <div class="social-links">
        <a href="https://www.instagram.com/kadirtml.tr?igsh=dGtzNms5azMwY2E3"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/cedricgaming"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>CEDRIC GAMING | DESIGNED FOR THE ELITE - 2026</footer>

</body>
</html>
