<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRIC GAMING | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4500; /* Turuncu */
            --bg-dark: #080808;
            --card-bg: #111111;
            --accent-green: #00ff41;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header / Logo Alanı */
        header {
            margin-top: 60px;
            text-align: center;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--primary);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Menü Konteynırı */
        .menu-container {
            width: 90%;
            max-width: 450px;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Ana Menü Butonları */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.15);
        }

        .menu-btn i {
            font-size: 1.4rem;
            color: var(--primary);
        }

        .menu-btn-content {
            flex: 1;
            margin-left: 20px;
        }

        .menu-btn-content span {
            display: block;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .menu-btn-content small {
            color: #666;
            font-size: 0.75rem;
        }

        /* ÖZEL SİPARİŞ BUTONU (Neon Efektli) */
        .order-btn {
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            border: none;
            box-shadow: 0 5px 20px rgba(255, 69, 0, 0.4);
            margin-top: 10px;
        }

        .order-btn .menu-btn-content span, 
        .order-btn .menu-btn-content small {
            color: #fff;
        }

        .order-btn i {
            color: #fff;
        }

        /* Sosyal Medya Alt Bar */
        .social-bar {
            margin-top: auto;
            padding: 40px 0;
            display: flex;
            gap: 25px;
        }

        .social-bar a {
            color: #444;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .social-bar a:hover {
            color: var(--primary);
            transform: translateY(-5px);
        }

        footer {
            padding-bottom: 30px;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">CEDRIC</h1>
        <div class="tagline">Gaming & Software</div>
    </header>

    <div class="menu-container">
        
        <a href="uygulamalar.html" class="menu-btn">
            <i class="fas fa-layer-group"></i>
            <div class="menu-btn-content">
                <span>UYGULAMALAR</span>
                <small>Premium Modlu App Arşivi</small>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 0.8rem; color: #333;"></i>
        </a>

        <a href="oyunlar.html" class="menu-btn">
            <i class="fas fa-gamepad"></i>
            <div class="menu-btn-content">
                <span>OYUNLAR</span>
                <small>Hileli ve Sınırsız Oyunlar</small>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 0.8rem; color: #333;"></i>
        </a>

        <a href="siparis.html" class="menu-btn order-btn">
            <i class="fas fa-rocket"></i>
            <div class="menu-btn-content">
                <span>ÖZEL SİPARİŞ</span>
                <small>Web Sitesi veya App Yaptır</small>
            </div>
            <i class="fas fa-arrow-right" style="font-size: 0.8rem;"></i>
        </a>

    </div>

    <div class="social-bar">
        <a href="https://instagram.com/cedricgaming" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/cedricgaming" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <footer>ESTABLISHED 2026 | CEDRIC GAMING PRO</footer>

</body>
</html>
