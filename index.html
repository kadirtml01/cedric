<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRİC GAMİNG | Premium Modding</title>
    <style>
        :root {
            --primary: #ff4500;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Arkaplan Işıltısı */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        header h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        header p {
            color: var(--primary);
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .menu-container {
            margin-top: 50px;
            display: grid;
            gap: 20px;
            width: 90%;
            max-width: 500px;
        }

        .menu-btn {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            text-decoration: none;
            color: white;
            border-radius: 4px; /* Keskin ve asil hatlar */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
            transition: width 0.3s ease;
            z-index: -1;
            opacity: 0.5;
        }

        .menu-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn:hover::before {
            width: 100%;
            opacity: 0.1;
        }

        footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <h1>CEDRİC GAMİNG</h1>
        <p>PREMIUM MODS & TOOLS</p>
    </header>

    <div class="menu-container">
        <a href="uygulamalar.html" class="menu-btn">
            UYGULAMALAR <span style="float: right; color: var(--primary);">→</span>
        </a>
        <a href="oyunlar.html" class="menu-btn">
            OYUNLAR <span style="float: right; color: var(--primary);">→</span>
        </a>
    </div>

    <footer>
        DESIGNED FOR THE ELITE - 2026
    </footer>

</body>
</html>
