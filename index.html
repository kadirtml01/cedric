<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRİC GAMİNG | Premium Modding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4500;
            --bg-dark: #080808;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 69, 0, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Hareketli Arkaplan Parçacıkları */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0a00 0%, #080808 100%);
            z-index: -1;
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        header { text-align: center; margin-bottom: 40px; animation: fadeIn 1.5s ease; }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
            background: linear-gradient(to bottom, #fff, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #888;
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* İstatistik Paneli (Sade görünümü bozar, dolgunluk katar) */
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .menu-container {
            display: grid;
            gap: 20px;
            width: 85%;
            max-width: 450px;
            z-index: 2;
        }

        .menu-btn {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 28px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn:hover {
            background: rgba(255, 69, 0, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.2);
            transform: scale(1.02);
        }

        .menu-btn i { font-size: 1.2rem; color: var(--primary); }

        .request-section { margin-top: 60px; text-align: center; }
        .request-text { font-size: 0.7rem; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

        .social-container { display: flex; gap: 30px; justify-content: center; }
        .social-icon { 
            color: #fff; font-size: 1.8rem; transition: 0.3s; opacity: 0.5;
        }
        .social-icon:hover { opacity: 1; transform: translateY(-5px); color: var(--primary); }

        footer { position: fixed; bottom: 20px; font-size: 0.6rem; color: #333; letter-spacing: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="orb"></div>
    </div>

    <header>
        <h1>CEDRİC GAMİNG</h1>
        <p>Expertise in Digital Excellence</p>
    </header>

    <div class="stats">
        <span>● 50+ Premium Mods</span>
        <span>● Daily Updates</span>
    </div>

    <div class="menu-container">
        <a href="uygulamalar.html" class="menu-btn">
            <span>Uygulamalar</span>
            <i class="fas fa-layer-group"></i>
        </a>
        <a href="oyunlar.html" class="menu-btn">
            <span>Oyunlar</span>
            <i class="fas fa-gamepad"></i>
        </a>
    </div>

    <div class="request-section">
        <div class="request-text">İstek oyun veya uygulama?</div>
        <div class="social-container">
            <a href="https://instagram.com/kadirtml.tr" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/cedricgaming" target="_blank" class="social-icon"><i class="fab fa-telegram"></i></a>
            <a href="https://youtube.com/@cedricgaming01" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <footer>ESTABLISHED 2026</footer>

</body>
</html>
