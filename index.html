<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRİC GAMİNG | Modlu Uygulamalar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #1f1f1f;
            padding: 30px;
            border-bottom: 3px solid #ff4500; /* Turuncu-kırmızı oyun teması rengi */
        }
        h1 { color: #ff4500; margin: 0; letter-spacing: 2px; }
        .container { padding: 20px; }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 450px;
            border: 1px solid #333;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }
        .download-btn {
            display: inline-block;
            background-color: #ff4500;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }
        .download-btn:hover { background-color: #e63e00; }
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
            background: #1a1a1a;
        }
    </style>
</head>
<body>

<header>
    <h1>CEDRİC GAMİNG</h1>
    <p>Profesyonel Modlu Uygulama Platformu</p>
</header>

<div class="container">
    <h2>GÜNCEL MODLAR</h2>

    <div class="card">
        <h3>Uygulama Adı Buraya</h3>
        <p>Mod Özellikleri: Reklamlar kaldırıldı, tüm özellikler açıldı.</p>
        <p style="color: #888; font-size: 0.85rem;">Uyumlu Sürüm: Android 9.0+</p>
        <a href="#" class="download-btn">DOSYAYI İNDİR</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 CEDRİC GAMİNG. Tüm içerikler bilgilendirme amaçlıdır.</p>

</html>
