<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRİC GAMİNG | Giriş</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 { color: #ff4500; font-size: 2.5rem; margin-bottom: 30px; }
        .menu-container {
            display: flex;
            gap: 20px;
            flex-direction: column;
            width: 80%;
            max-width: 400px;
        }
        .menu-btn {
            background-color: #1e1e1e;
            color: white;
            padding: 25px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #333;
            transition: 0.3s;
        }
        .menu-btn:hover {
            border-color: #ff4500;
            background-color: #252525;
            transform: scale(1.05);
        }
        .btn-apps { border-left: 8px solid #00c853; } /* Uygulamalar için Yeşil */
        .btn-games { border-left: 8px solid #3d5afe; } /* Oyunlar için Mavi */
    </style>
</head>
<body>

    <h1>CEDRİC GAMİNG</h1>
    <p>Lütfen bir kategori seçin</p>

    <div class="menu-container">
        <a href="uygulamalar.html" class="menu-btn btn-apps">MODLU UYGULAMALAR</a>
        <a href="oyunlar.html" class="menu-btn btn-games">MODLU OYUNLAR</a>
    </div>

    <footer style="position: absolute; bottom: 20px; color: #555;">
        &copy; 2026 CEDRİC GAMİNG
    </footer>

</body>
</html>
