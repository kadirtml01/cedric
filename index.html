<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRİC GAMİNG | Premium Modding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4500;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        header p {
            color: var(--primary);
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .menu-container {
            margin-top: 40px;
            display: grid;
            gap: 15px;
            width: 85%;
            max-width: 450px;
        }

        .menu-btn {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            background: rgba(255, 69, 0, 0.05);
        }

        /* İletişim ve İstek Alanı */
        .request-section {
            margin-top: 60px;
            text-align: center;
        }

        .request-text {
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .social-container {
            display: flex;
            gap: 35px;
            justify-content: center;
        }

        .social-icon {
            color: #888;
            font-size: 2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: scale(1.2);
        }

        .instagram:hover { color: #E1306C; }
        .telegram:hover { color: #0088cc; }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: #222;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <h1>CEDRİC GAMİNG</h1>
        <p>PREMIUM MODS & TOOLS</p>
    </header>

    <div class="menu-container">
        <a href="uygulamalar.html" class="menu-btn">
            UYGULAMALAR <span style="float: right; color: var(--primary); opacity: 0.5;">→</span>
        </a>
        <a href="oyunlar.html" class="menu-btn">
            OYUNLAR <span style="float: right; color: var(--primary); opacity: 0.5;">→</span>
        </a>
    </div>

    <div class="request-section">
        <div class="request-text">İstek oyun veya uygulama?</div>
        <div class="social-container">
            <a href="https://instagram.com/kadirtml.tr" target="_blank" class="social-icon instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://t.me/cedricgaming" target="_blank" class="social-icon telegram">
                <i class="fab fa-telegram"></i>
            </a>
        </div>
    </div>

    <footer>
        DESIGNED FOR THE ELITE - 2026
    </footer>

</body>
</html>
