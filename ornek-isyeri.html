<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDRIC AUTO | PERFORMANCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Oswald', sans-serif; background: #000; color: #fff; }
        
        .main-container {
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .image-section {
            height: 40vh;
            background: linear-gradient(to bottom, transparent, #000), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
        }

        .text-section {
            padding: 30px 20px;
            text-align: left;
            flex: 1;
        }

        .badge { color: #ff4500; font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 10px; }
        h2 { font-size: 2.8rem; line-height: 1; margin: 10px 0; font-style: italic; }
        .desc { font-family: sans-serif; color: #888; font-size: 0.9rem; line-height: 1.5; margin-bottom: 30px; }

        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            border-top: 1px solid #222; padding-top: 30px;
        }
        .stat-box h4 { color: #ff4500; font-size: 1.5rem; margin: 0; }
        .stat-box p { font-family: sans-serif; font-size: 0.6rem; letter-spacing: 2px; color: #555; margin: 5px 0 0 0; }

        .back-btn { position: fixed; top: 20px; right: 20px; background: #ff4500; color: #fff; padding: 10px; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 100; }
    </style>
</head>
<body>
    <a href="ornek-siteler.html" class="back-btn"><i class="fas fa-times"></i></a>
    <div class="main-container">
        <div class="image-section"></div>
        <div class="text-section">
            <div class="badge">PERFORMANCE</div>
            <h2>GÜCÜN <br>MERKEZİ.</h2>
            <p class="desc">OBD Diagnoz, Motor Revizyon ve Şanzıman Tamiri. Aracınızın gerçek potansiyelini uzman ellerde keşfedin.</p>
            
            <div class="stats">
                <div class="stat-box"><h4>+150 HP</h4><p>GÜÇ ARTIŞI</p></div>
                <div class="stat-box"><h4>%100</h4><p>HATA TESPİTİ</p></div>
                <div class="stat-box"><h4>7/24</h4><p>TEKNİK DESTEK</p></div>
                <div class="stat-box"><h4>VDS</h4><p>YAZILIM GÜNCELLEME</p></div>
            </div>
        </div>
    </div>
</body>
</html>
