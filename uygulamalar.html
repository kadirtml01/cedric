<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulamalar | CEDRİC GAMİNG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff4500; --bg-dark: #050505; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; }
        header h1 { font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; color: #fff; }
        .back-link { color: var(--primary); text-decoration: none; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }

        .container { width: 90%; max-width: 600px; flex-grow: 1; margin-bottom: 50px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border-left: 4px solid #00c853; /* Uygulama teması yeşil */
        }
        .card h3 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        .card p { font-size: 0.85rem; color: #aaa; margin: 10px 0; }
        .dl-btn {
            display: inline-block;
            padding: 8px 20px;
            background: transparent;
            color: #fff;
            border: 1px solid var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .dl-btn:hover { background: var(--primary); }

        .request-section { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); width: 100%; }
        .request-text { font-size: 0.75rem; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .social-container { display: flex; gap: 30px; justify-content: center; }
        .social-icon { color: #888; font-size: 1.6rem; transition: 0.3s; text-decoration: none; }
        .instagram:hover { color: #E1306C; }
        .telegram:hover { color: #0088cc; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Ana Sayfa</a>
        <h1>MODLU UYGULAMALAR</h1>
    </header>

    <div class="container">
        <div class="card">
            <h3>Örnek Uygulama v1.0</h3>
            <p>Premium özellikler aktif, reklamlar kaldırıldı.</p>
            <a href="#" class="dl-btn">İNDİR</a>
        </div>
        </div>

    <div class="request-section">
        <div class="request-text">İstek oyun veya uygulama?</div>
        <div class="social-container">
            <a href="https://instagram.com/kadirtml.tr" target="_blank" class="social-icon instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/cedricgaming" target="_blank" class="social-icon telegram"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

</body>
</html>
