<!DOCTYPE html>
<html lang="tr">
<head>

        .left { flex: 1; }
        .right { flex: 1; display: flex; justify-content: center; }
        .circle-img { 
            width: 400px; height: 400px; border-radius: 50%; 
            background: url('https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=800&q=80');

        }
        .skills-bar { margin-top: 30px; }
        .bar { background: #222; height: 10px; border-radius: 5px; margin-bottom: 20px; position: relative; }
        .fill { background: #d4af37; height: 100%; border-radius: 5px; }
        .back-btn { position: fixed; bottom: 30px; right: 30px; background: #d4af37; color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; }

</head>
<body>
    <a href="ornek-siteler.html" class="back-btn">← GERİ DÖN</a>
    <div class="section">
        <div class="left">
            <h2 style="font-size: 5rem; margin: 0;">BEN <br><span style="color: #d4af37;">KADIR.</span></h2>
            <p style="font-size: 1.2rem; color: #888; margin-top: 20px;">Sıradan kodları asil tasarımlara dönüştürüyorum. <br>UI/UX Tasarımcısı ve Android Geliştirici.</p>
            <div class="skills-bar">
                <div style="font-size: 0.8rem; margin-bottom: 5px;">WEB TASARIM %95</div>
                <div class="bar"><div class="fill" style="width: 95%;"></div></div>
                <div style="font-size: 0.8rem; margin-bottom: 5px;">APP MODDING %100</div>
                <div class="bar"><div class="fill" style="width: 100%;"></div></div>
            </div>
        </div>
        <div class="right">
            <div class="circle-img"></div>
        </div>
    </div>
</body>
</html>
