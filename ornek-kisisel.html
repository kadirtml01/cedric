<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KADİR | PORTFOLYO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Geri Dön Butonu - Daha Şık */
        .back-nav {
            padding: 20px;
            z-index: 100;
        }
        .back-nav a {
            color: #d4af37;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* Resim Alanı - Mobilde Taşmayı Önler */
        .profile-container {
            position: relative;
            margin-bottom: 30px;
        }

        .circle-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            border: 3px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .text-area h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        .text-area h1 span {
            color: #d4af37;
            display: block;
            font-size: 3.5rem;
        }

        .tagline {
            color: #888;
            font-size: 0.9rem;
            max-width: 300px;
            margin: 20px auto;
            line-height: 1.6;
        }

        /* Yetenek Barları - Mobilde Sığacak Şekilde */
        .skills {
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            text-align: left;
        }

        .skill-item { margin-bottom: 15px; }
        .skill-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: #d4af37;
        }

        .bar-bg { background: #1a1a1a; height: 6px; border-radius: 10px; overflow: hidden; }
        .bar-fill { background: #d4af37; height: 100%; border-radius: 10px; }

        footer {
            padding: 30px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="ornek-siteler.html"><i class="fas fa-chevron-left"></i> GALERİYE DÖN</a>
    </div>

    <div class="content">
        <div class="profile-container">
            <div class="circle-img"></div>
        </div>

        <div class="text-area">
            <p style="color: #666; letter-spacing: 4px; font-size: 0.7rem; margin: 0;">PROFESSIONAL DEVELOPER</p>
            <h1>BEN <span>KADİR.</span></h1>
            <p class="tagline">Sıradan kodları asil tasarımlara dönüştürüyorum. UI/UX Tasarımcısı ve Android Geliştirici.</p>
        </div>

        <div class="skills">
            <div class="skill-item">
                <div class="skill-info"><span>WEB TASARIM</span><span>%95</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 95%;"></div></div>
            </div>
            <div class="skill-item">
                <div class="skill-info"><span>APP MODDING</span><span>%100</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 100%;"></div></div>
            </div>
        </div>
    </div>

    <footer>ESTABLISHED 2026</footer>

</body>
</html>
